        <p>今天介绍的是一个三方库. <code>SnapKit</code> 是在iOS开发中使用添加约束的纯代码库, 使用<code>Swift</code>语言进行编写. 跟<code>Masonry</code>基本一样, 详细点击READ MORE.<br><a id="more"></a><br><img src="http://ww2.sinaimg.cn/large/e6a4355cgw1f3yhapg0dcj206z0bzaa4.jpg" alt=""></p>
<figure class="highlight objectivec"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div></pre></td><td class="code"><pre><div class="line">var redView      = <span class="built_in">UIView</span>()</div><div class="line">var yellowView   = <span class="built_in">UIView</span>()</div><div class="line">var greenView    = <span class="built_in">UIView</span>()</div><div class="line">var blackView    = <span class="built_in">UIView</span>()</div><div class="line">var purpleView   = <span class="built_in">UIView</span>()</div><div class="line">var cyanView     = <span class="built_in">UIView</span>()</div><div class="line">var grayViewBtn  = <span class="built_in">UIButton</span>()</div><div class="line">var leftView     = <span class="built_in">UIView</span>()</div><div class="line">var rightView    = <span class="built_in">UIView</span>()</div></pre></td></tr></table></figure>
<p>在viewdidload中进行一些设置<br><figure class="highlight objectivec"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div><div class="line">34</div><div class="line">35</div><div class="line">36</div><div class="line">37</div><div class="line">38</div><div class="line">39</div><div class="line">40</div><div class="line">41</div><div class="line">42</div><div class="line">43</div><div class="line">44</div><div class="line">45</div><div class="line">46</div><div class="line">47</div><div class="line">48</div><div class="line">49</div><div class="line">50</div><div class="line">51</div><div class="line">52</div><div class="line">53</div><div class="line">54</div><div class="line">55</div><div class="line">56</div><div class="line">57</div><div class="line">58</div><div class="line">59</div><div class="line">60</div><div class="line">61</div><div class="line">62</div><div class="line">63</div><div class="line">64</div><div class="line">65</div><div class="line">66</div><div class="line">67</div><div class="line">68</div><div class="line">69</div><div class="line">70</div><div class="line">71</div><div class="line">72</div><div class="line">73</div><div class="line">74</div><div class="line">75</div><div class="line">76</div></pre></td><td class="code"><pre><div class="line">redView.backgroundColor = <span class="built_in">UIColor</span>.redColor()</div><div class="line">yellowView.backgroundColor = <span class="built_in">UIColor</span>.yellowColor()</div><div class="line">greenView.backgroundColor = <span class="built_in">UIColor</span>.greenColor()</div><div class="line">blackView.backgroundColor = <span class="built_in">UIColor</span>.blackColor()</div><div class="line">purpleView.backgroundColor = <span class="built_in">UIColor</span>.purpleColor()</div><div class="line">cyanView.backgroundColor = <span class="built_in">UIColor</span>.cyanColor()</div><div class="line">grayViewBtn.backgroundColor = <span class="built_in">UIColor</span>.grayColor()</div><div class="line">leftView.backgroundColor = <span class="built_in">UIColor</span>.cyanColor()</div><div class="line">rightView.backgroundColor = <span class="built_in">UIColor</span>.orangeColor()</div><div class="line"><span class="comment">// 添加</span></div><div class="line">view.addSubview(redView)</div><div class="line">view.addSubview(yellowView)</div><div class="line">view.addSubview(greenView)</div><div class="line">view.addSubview(blackView)</div><div class="line">view.addSubview(purpleView)</div><div class="line">view.addSubview(cyanView)</div><div class="line">view.addSubview(grayViewBtn)</div><div class="line">view.addSubview(leftView)</div><div class="line">view.addSubview(rightView)</div><div class="line">grayViewBtn.setTitle(<span class="string">"PopLabel"</span>, forState: <span class="built_in">UIControlState</span>.Normal)</div><div class="line">grayViewBtn.addTarget(<span class="keyword">self</span>, action: <span class="meta">#selector(ViewController.clcik), forControlEvents: UIControlEvents.TouchUpInside)</span></div><div class="line"><span class="comment">// 进行约束</span></div><div class="line">blackView.snp_makeConstraints &#123; make <span class="keyword">in</span></div><div class="line">make.center.equalTo(view)</div><div class="line">make.size.equalTo(<span class="built_in">CGSizeMake</span>(<span class="number">100.0</span>, <span class="number">100.0</span>))</div><div class="line">&#125;</div><div class="line"></div><div class="line">redView.snp_makeConstraints &#123; make <span class="keyword">in</span></div><div class="line">make.top.equalTo(blackView.snp_bottom).offset(<span class="number">20.0</span>)</div><div class="line">make.left.equalTo(<span class="number">20.0</span>)</div><div class="line">make.size.equalTo(<span class="built_in">CGSizeMake</span>(<span class="number">100.0</span>, <span class="number">100.0</span>))</div><div class="line">&#125;</div><div class="line"></div><div class="line">yellowView.snp_makeConstraints &#123; make <span class="keyword">in</span></div><div class="line">make.top.equalTo(blackView.snp_bottom).offset(<span class="number">20.0</span>)</div><div class="line">make.left.equalTo(blackView.snp_right).offset(<span class="number">20.0</span>)</div><div class="line">make.size.equalTo(<span class="built_in">CGSizeMake</span>(<span class="number">100.0</span>, <span class="number">100.0</span>))</div><div class="line">&#125;</div><div class="line"></div><div class="line">purpleView.snp_makeConstraints &#123; make <span class="keyword">in</span></div><div class="line">make.bottom.equalTo(blackView.snp_top).offset(<span class="number">-20.0</span>)</div><div class="line">make.left.equalTo(blackView.snp_right).offset(<span class="number">20.0</span>)</div><div class="line">make.size.equalTo(<span class="built_in">CGSizeMake</span>(<span class="number">100.0</span>, <span class="number">100.0</span>))</div><div class="line">&#125;</div><div class="line"></div><div class="line">greenView.snp_makeConstraints &#123; make <span class="keyword">in</span></div><div class="line">make.bottom.equalTo(blackView.snp_top).offset(<span class="number">-20.0</span>)</div><div class="line">make.right.equalTo(blackView.snp_left).offset(<span class="number">-20.0</span>)</div><div class="line">make.size.equalTo(<span class="built_in">CGSizeMake</span>(<span class="number">100.0</span>, <span class="number">100.0</span>))</div><div class="line">&#125;</div><div class="line"><span class="comment">// cyan</span></div><div class="line">cyanView.snp_makeConstraints(closure: &#123; (make) <span class="keyword">in</span></div><div class="line">make.top.equalTo(redView.snp_bottom).offset(<span class="number">20.0</span>)</div><div class="line">make.centerX.equalTo(view)</div><div class="line">make.size.equalTo(<span class="built_in">CGSizeMake</span>(<span class="number">100.0</span>, <span class="number">100.0</span>))</div><div class="line">&#125;)</div><div class="line"><span class="comment">// gray</span></div><div class="line">grayViewBtn.snp_makeConstraints(closure: &#123; (make) <span class="keyword">in</span></div><div class="line">make.bottom.equalTo(greenView.snp_top).offset(<span class="number">-20.0</span>)</div><div class="line">make.centerX.equalTo(view)</div><div class="line">make.size.equalTo(<span class="built_in">CGSizeMake</span>(<span class="number">100.0</span>, <span class="number">100.0</span>))</div><div class="line">&#125;)</div><div class="line"><span class="comment">//</span></div><div class="line">leftView.snp_makeConstraints(closure: &#123; (make) <span class="keyword">in</span></div><div class="line">make.top.equalTo(greenView.snp_bottom).offset(<span class="number">20.0</span>)</div><div class="line">make.bottom.equalTo(redView.snp_top).offset(<span class="number">-20.0</span>)</div><div class="line">make.left.equalTo(view.snp_left).offset(<span class="number">5</span>)</div><div class="line">make.width.equalTo(<span class="number">50</span>)</div><div class="line">&#125;)</div><div class="line"></div><div class="line">rightView.snp_makeConstraints(closure: &#123; (make) <span class="keyword">in</span></div><div class="line">make.top.equalTo(purpleView.snp_bottom).offset(<span class="number">20.0</span>)</div><div class="line">make.bottom.equalTo(yellowView.snp_top).offset(<span class="number">-20.0</span>)</div><div class="line">make.right.equalTo(view.snp_right).offset(<span class="number">-5</span>)</div><div class="line">make.width.equalTo(leftView)</div><div class="line">&#125;)</div></pre></td></tr></table></figure></p>
